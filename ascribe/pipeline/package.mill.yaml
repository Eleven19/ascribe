extends: [ScalaModule, scalafmt.ScalafmtModule]
scalaVersion: "3.8.2"
scalacOptions:
  - "-Wvalue-discard"
  - "-Wnonunit-statement"
  - "-Wconf:msg=(unused.*value|discarded.*value|pure.*statement):error"
  - "-language:strictEquality"
moduleDeps:
  - build.ascribe
  - build.ascribe.asg
  - build.ascribe.bridge
mvnDeps:
  - io.getkyo::kyo-core::1.0-RC1
  - io.getkyo::kyo-direct::1.0-RC1
