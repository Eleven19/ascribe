name: Publish SNAPSHOT

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or commit to publish from (defaults to the workflow's ref)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish SNAPSHOT
    runs-on: ubuntu-latest
    env:
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      SONATYPE_GPG_PRIVATE_KEY: ${{ secrets.SONATYPE_GPG_PRIVATE_KEY }}
      SONATYPE_GPG_PASSPHRASE: ${{ secrets.SONATYPE_GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Import GPG key
        if: env.SONATYPE_GPG_PRIVATE_KEY != ''
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ env.SONATYPE_GPG_PRIVATE_KEY }}
          passphrase: ${{ env.SONATYPE_GPG_PASSPHRASE }}

      - name: Compute publish version
        id: version
        shell: bash
        run: |
          base_version="$(cat VERSION | tr -d '[:space:]')"
          version="$(scripts/ci/compute-publish-version.sh "$base_version")"
          echo "publish_version=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $version"

      - name: Publish SNAPSHOT to Maven Central
        if: env.SONATYPE_USERNAME != ''
        shell: bash
        run: scripts/ci/publish-central.sh "${{ steps.version.outputs.publish_version }}"
