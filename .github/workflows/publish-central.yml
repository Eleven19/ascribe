name: Publish Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0) — omit the leading v"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
      release_name: ${{ steps.metadata.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4

      - id: metadata
        uses: ./.github/actions/release-metadata
        with:
          version: ${{ inputs.version || '' }}

  publish:
    needs: metadata
    runs-on: ubuntu-latest
    env:
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      SONATYPE_GPG_PRIVATE_KEY: ${{ secrets.SONATYPE_GPG_PRIVATE_KEY }}
      SONATYPE_GPG_PASSPHRASE: ${{ secrets.SONATYPE_GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ env.SONATYPE_GPG_PRIVATE_KEY }}
          passphrase: ${{ env.SONATYPE_GPG_PASSPHRASE }}

      - name: Publish to Maven Central
        shell: bash
        run: scripts/ci/publish-central.sh "${{ needs.metadata.outputs.version }}"
